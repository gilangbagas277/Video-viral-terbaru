<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Processing</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,Segoe UI;
}

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
padding:20px;
}

/* glow */

body::before{
content:"";
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,#3b82f6,#22c55e,transparent);
filter:blur(200px);
opacity:.25;
z-index:-1;
}

/* container */

.app{
width:100%;
max-width:420px;
}

/* header */

.header{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.title{
font-size:18px;
font-weight:600;
}

.timer{
font-size:18px;
font-weight:bold;
}

/* card */

.card{
background:rgba(255,255,255,.05);
backdrop-filter:blur(25px);
border-radius:18px;
padding:16px;
margin-bottom:15px;
}

/* preview */

.preview{
height:180px;
border-radius:14px;
background:linear-gradient(45deg,#0f172a,#1e293b);
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
position:relative;
overflow:hidden;
}

.scanline{
position:absolute;
width:100%;
height:4px;
background:#22c55e;
animation:scan 3s linear infinite;
}

@keyframes scan{
0%{top:-10px}
100%{top:190px}
}

/* progress */

.progressBar{
height:10px;
background:rgba(255,255,255,.1);
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#3b82f6);
}

.percent{
font-size:12px;
margin-top:6px;
color:#cbd5f5;
}

/* scanning animation text */

.scantext{
font-size:13px;
margin-top:6px;
color:#94a3b8;
}

/* counter */

.counter{
font-size:22px;
font-weight:bold;
margin-top:6px;
color:#22c55e;
}

/* download text */

.download{
margin-top:10px;
font-size:14px;
background:rgba(34,197,94,.15);
padding:10px;
border-radius:10px;
text-align:center;
}

/* server */

.server{
display:flex;
align-items:center;
gap:8px;
font-size:13px;
}

.dot{
width:9px;
height:9px;
border-radius:50%;
background:#22c55e;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{opacity:.5}
50%{opacity:1}
100%{opacity:.5}
}

.footer{
text-align:center;
font-size:11px;
margin-top:10px;
color:#64748b;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="title">Video Processing</div>
<div class="timer" id="timer">60:00</div>
</div>

<div class="card">

<div class="preview">
🎬
<div class="scanline"></div>
</div>

<div class="progressBar">
<div class="progress" id="progress"></div>
</div>

<div class="percent" id="percent">
0% processed
</div>

<div class="scantext" id="status">
Scanning video files...
</div>

<div class="counter" id="counter">
0 video ditemukan
</div>

<div class="download">
📥 Total video yang dapat di download :  
<b>1000 video viral terbaru</b>
</div>

</div>

<div class="card">

<div class="server">
<div class="dot"></div>
Connected to processing server
</div>

</div>

<div class="footer">
Mobile Video Processing Engine
</div>

</div>

<script>

let total=60*60
let remaining=total

const timer=document.getElementById("timer")
const progress=document.getElementById("progress")
const percent=document.getElementById("percent")
const status=document.getElementById("status")
const counter=document.getElementById("counter")

let videos=0

function update(){

let m=Math.floor(remaining/60)
let s=remaining%60

if(m<10)m="0"+m
if(s<10)s="0"+s

timer.innerText=m+":"+s

let done=total-remaining
let p=Math.floor((done/total)*100)

progress.style.width=p+"%"
percent.innerText=p+"% processed"

if(videos<1000){
videos+=Math.floor(Math.random()*4)
if(videos>1000)videos=1000
}

counter.innerText=videos+" video ditemukan"

if(p>20)status.innerText="Menganalisis video..."
if(p>40)status.innerText="Memproses frame video..."
if(p>60)status.innerText="Mengindeks video viral..."
if(p>80)status.innerText="Menyiapkan download..."

if(remaining>0)remaining--

}

setInterval(update,1000)

</script>

</body>
</html>
